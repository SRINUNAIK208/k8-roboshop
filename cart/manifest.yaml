apiVersion: v1
kind: ConfigMap
metadata: 
  name: cart
  namespace: roboshop
  labels:
    component: cart
    project: roboshop
    env: dev
data:
  REDIS_HOST: "redis"
  CATALOGUE_HOST: "catalogue"
  CATALOGUE_PORT: "8080"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart
  namespace: roboshop
  labels:
    component: cart 
    project: roboshop
    env: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      component: cart
      project: roboshop
      env: dev
  template:
    metadata:
      labels:
       component: cart
       project: roboshop
       env: dev
    spec:
      containers:
        - name: cart
          image: srinunaik208/cart:v1
          envFrom:
           - configMapRef:
               name: cart
---
apiVersion: v1
kind: Service
metadata:
  name: cart
  namespace: roboshop
  labels:
    component: cart
    project: roboshop
    env: dev
spec:
  selector:
    component: cart
    project: roboshop
    env: dev
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
             
        
  