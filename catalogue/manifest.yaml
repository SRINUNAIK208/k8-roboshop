apiVersion: v1
kind: ConfigMap
metadata:
  name: catalogue
  labels:
    component: catalogue
    project: roboshop
    env: dev
data:
  MONGO: "true" 
  MONGO_URL: "mongodb://mongodb:27017/catalogue"

---
    
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    component: catalogue
    project: roboshop
    env: dev
spec:
  replace: 1
  selector:
    matchLabels:
      component: catalogue
      project: roboshop
      env: dev
  template:
    metadata:
      labels:
        component: catalogue
        project: roboshop
        env: dev
    spec:
      containers:
        - name: catalogue
          image: srinunaik208/catalogue:v1
          envFrom:
            - configMapRef:
                name: catalogue
---
apiVersion: v1
kind: Service
metadata:
  name: catalogue-svc 
  namespace: roboshop
  labels:
    component: catalogue
    project: roboshop
    env: dev
spec:
  selector:
    component: catalogue
    project: roboshop
    env: dev
  ports:
   - protocol: TCP
     port: 8080
     targetPort: 8080
    
