apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: roboshop
  labels:
    component: redis
    project: roboshop
    env: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      component: redis
      project: roboshop
      env: dev
  template:
    metadata: 
      labels:
        component: redis
        project: roboshop
        env: dev
    spec:
      containers:
        - name: redis
          image: redis:7.0

---

apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: roboshop
  labels:
    component: redis 
    project: roboshop
    env: dev
spec:
  selector:
    component: redis
    project: roboshop
    env: dev
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379