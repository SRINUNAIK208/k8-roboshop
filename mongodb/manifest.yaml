apiVersion: apps/v1
kind: Deployment
metadata:  
  name: roboshop
  namespace: roboshop
  labels:
    project: roboshop
    env: dev
spec:
 replicas: 1
 selector:
   matchLabels:
     component: mongodb
     project: roboshop
     env: dev
 template:
   metadata:
     labels:
       component: mongodb
       project: roboshop
       env: dev
   spec:
     containers:
      - name: mongodb
        image: srinunaik208/mongodb:v1