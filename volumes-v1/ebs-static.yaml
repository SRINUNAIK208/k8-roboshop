apiVersion: v1
kind: PersistentVolume
metadata:
  name: ebs-static 
spec:
  accessModes:
   - ReadWriteOnce
  capacity:
     storage: 15Gi
  csi:
     driver: ebs.csi.aws.com
     fsType: ext4
        volumeHandle:
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ebs-static
spec:
  accessModes: 
   - ReadWriteOnce
  volumeName: ebs-static
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: nginx
  labels:
    purpose: ebs-static-demo
spec:
  containers:
    - name: nginx
      image: nginx
      volumeMounts:
      - name: ebs-storage
        mountPath: /usr/share/nginx
  volumes:
    name: ebs-storage
    persistentVolumeClaim:
      claimName: ebs-static
---
apiVersion: v1
kind: Service
metadata:
  name: ebs-service
spec:
 selector:
    purpose: ebs-static-demo
 ports:
  - protocol: TCP
    port: 80
    targetPort: 80

   
