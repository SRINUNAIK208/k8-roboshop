apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq
  namespace: roboshop
  labels:
    component: rabbitmq
    project: roboshop
    env: dev
type: Opaque
data:
  RABBITMQ_DEFAULT_USER: "cm9ib3Nob3A="
  RABBITMQ_DEFAULT_PASS: "cm9ib3Nob3AxMjM="
---
apiVersion: apps/v1
kind: Deployment
metadata: 
  name: rabbitmq
  namespace: roboshop
  labels:
    component: rabbitmq
    project: roboshop
    env: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      component: rabbitmq
      project: roboshop
      env: dev
  template:
    metadata:
      labels:
        component: rabbitmq
        project: roboshop
        env: dev
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3
          envFrom:
           - secretRef:
               name: rabbitmq
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: roboshop
  labels:
    component: rabbitmq
    project: roboshop
    env: dev
spec:
  selector:
    component: rabbitmq
    project: roboshop
    env: dev
  ports:
   - protocol: TCP
     port: 5672
     targetPort: 5672
