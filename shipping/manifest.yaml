apiVersion: v1
kind: ConfigMap
metadata: 
  name: shipping
  namespace: roboshop
  labels:
    component: shipping
    project: roboshop
    env: dev
data:
  CART_ENDPOINT: "cart:8080"
  DB_HOST: "mysql"
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipping
  namespace: roboshop
  labels:
    component: shipping
    project: roboshop
    env: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      component: shipping
      project: roboshop
      env: dev
  template:
    metadata:
      labels:
        component: shipping
        project: roboshop
        env: dev
    spec:
      containers:
        - name: shipping
          image: srinunaik208/shipping:v1 
          envFrom:
           - configMapRef:
               name: shipping

---

apiVersion: v1
kind: Service
metadata: 
  name: shipping
  namespace: roboshop
  labels:
    component: shipping
    project: roboshop
    env: dev
spec:
  selector:
    component: shipping
    project: roboshop
    env: dev
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080

    
  