apiVersion: v1
kind: PersistentVolume
metadata:
  name: ebs-static
spec:
 accessModes:
   - ReadWriteOnce
 capacity:
     storage: 20Gi
 csi:
     driver: ebs.csi.aws.com
     fsType: ext4
     volumeHandle: vol-08ff10605079b2ec0
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ebs-static
spec:
  storageClassName: ""
  volumeName: ebs-static
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi     
---
apiVersion: v1
kind: Pod
metadata:
  name: nginx
  labels:
    purpose: ebs-practise
spec:
  containers:
   - name: nginx
     image: nginx
     volumeMounts:
      - name: ebs-static
        mountPath: /usr/share/nginx/html
  volumes:
   - name: ebs-static
     PersistentVolumeClaim: 
       claimName: ebs-static

  

