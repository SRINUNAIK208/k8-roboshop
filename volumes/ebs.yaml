apiVersion: v1
kind: PersistentVolume
metadata:
  name: ebs-static
spec:
 accessModes:
   - ReadWriteOnce
 capacity:
     storage: 20Gi
 csi:
     driver: ebs.csi.aws.com
     fsType: ext4
     volumeHandle: vol-08ff10605079b2ec0
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ebs-static
spec:
  storageClassName: ""
  volumeName: ebs-static
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi     
---
apiVersion: v1
kind: Pod
metadata:
  name: nginx
  labels:
    purpose: ebs-practise
spec:
  nodeSelector:
    topology.kubernetes.io/zone: us-east-1c
  containers:
   - name: nginx
     image: nginx
     volumeMounts:
      - name: persistence-storage
        mountPath: /usr/share/nginx/html
  volumes:
   - name: persistence-storage
     persistentVolumeClaim: 
       claimName: ebs-static

  

